<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Tracking</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f6fb;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #111827;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th,
    td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
    }

    th {
      background: #f3f4f6;
      color: #111827;
      font-weight: 600;
    }

    tr:hover {
      background: #f9fafb;
    }

    .ticker-button {
      background: none;
      border: none;
      color: #1d4ed8;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }

    .ticker-button:hover,
    .ticker-button:focus {
      text-decoration: underline;
      outline: none;
    }

    .details-row {
      background: #f9fafb;
    }

    .details-content {
      padding: 18px 0;
      display: grid;
      gap: 24px;
    }

    .stock-form {
      margin-top: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid #e5e7eb;
    }

    .field-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 180px;
    }

    .field-group span {
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 6px;
    }

    .field-group input {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      color: #0f172a;
      background: #ffffff;
    }

    .status-message {
      margin: 10px 0 0;
      color: #475569;
      font-size: 0.95rem;
      min-height: 1.2rem;
    }

    .field-fullwidth {
      flex: 2;
    }

    .primary-button {
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      cursor: pointer;
      min-width: 140px;
      align-self: flex-end;
      transition: background 0.2s ease;
    }

    .primary-button:hover {
      background: #1d4ed8;
    }

    .secondary-button {
      background: #f8fafc;
      color: #0f172a;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .secondary-button:hover {
      background: #e2e8f0;
    }

    .growth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .growth-tab {
      background: #f8fafc;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      color: #475569;
      padding: 6px 14px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .growth-tab.active {
      background: #2563eb;
      color: #ffffff;
      border-color: #2563eb;
    }

    .details-grid {
      display: grid;
      gap: 20px;
    }

    .details-tables {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .chart-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .details-table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
    }

    .details-table th,
    .details-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .details-table th {
      background: #eef2ff;
      font-weight: 700;
    }

    .chart-card {
      position: relative;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.04);
    }

    .chart-popup {
      display: none;
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, calc(100vw - 40px));
      max-width: 520px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.2);
      padding: 18px;
      z-index: 50;
    }

    .chart-card:hover .chart-popup {
      display: block;
    }

    .chart-popup::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      background: #ffffff;
      border-left: 1px solid #cbd5e1;
      border-bottom: 1px solid #cbd5e1;
      transform: translateX(-50%) rotate(45deg);
      z-index: -1;
    }

    .chart-popup .chart-title {
      margin: 0 0 8px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #111827;
    }

    .chart-popup .chart-axis {
      margin: 0 0 12px;
      font-size: 0.82rem;
      color: #64748b;
    }

    .chart-label {
      margin: 0 0 8px;
      font-size: 0.95rem;
      color: #334155;
      font-weight: 600;
    }

    .chart-axis {
      margin: 0 0 8px;
      font-size: 0.82rem;
      color: #64748b;
      line-height: 1.4;
    }

    .news-hover {
      position: relative;
      display: inline-block;
    }

    .news-popup {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      min-width: 300px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
      padding: 12px;
      z-index: 20;
    }

    .news-hover:hover .news-popup {
      display: block;
    }

    .news-table {
      width: 100%;
      border-collapse: collapse;
    }

    .news-table th,
    .news-table td {
      padding: 8px 10px;
      border: 1px solid #e5e7eb;
      text-align: left;
      font-size: 0.9rem;
      color: #334155;
    }

    .news-table th {
      background: #f8fafc;
      font-weight: 700;
    }

    .chart-svg {
      width: 100%;
      height: 180px;
    }

    .section-heading {
      margin: 0 0 12px;
      font-size: 1.05rem;
      color: #0f172a;
      font-weight: 700;
    }

    .summary,
    .news-list {
      display: grid;
      gap: 10px;
    }

    .news-list li {
      list-style: disc;
      margin-left: 1.3rem;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 720px) {
      .details-content {
        gap: 18px;
      }
    }
.tabs-container {

    margin-bottom: 20px;
}

.news-tab {

    display: inline-block;

    padding: 10px 18px;

    background: #2563eb;

    color: white;

    text-decoration: none;

    border-radius: 10px;

    font-weight: bold;

    transition: 0.2s;
}

.news-tab:hover {

    background: #1d4ed8;
}
  </style>
</head>
<body>
  <div class="tabs-container">

    <a href="/feeds.html" class="news-tab">
        SEC Stock Feeds
    </a>

    <a href="/" class="news-tab">
        Stock Tracker
    </a>

</div>

<div class="container">

    <h1>Stock Tracker</h1>

    <p>
        Click a ticker to expand the company details for earnings,
        revenue, graphs, latest earnings summary, and news.
        Add or remove tickers as needed.
    </p>

    <form id="add-stock-form" class="stock-form">

        <div class="field-row">

            <label class="field-group">

                <span>Ticker</span>

                <input
                    id="ticker-input"
                    name="ticker"
                    type="text"
                    placeholder="AAPL"
                    required
                />

            </label>

            <button type="submit" class="primary-button">
                Add Ticker
            </button>

        </div>

        <p
            id="status-message"
            class="status-message"
            aria-live="polite"
        ></p>

    </form>

    <table>

        <thead>

            <tr>
                <th>Ticker</th>
                <th>Company Name</th>
                <th>Market Cap</th>
                <th>Description</th>
                <th>52 Week High</th>
                <th>News</th>
                <th>Beta</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody id="stock-table-body"></tbody>

    </table>

</div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('add-stock-form');
      const tableBody = document.getElementById('stock-table-body');
      const statusMessage = document.getElementById('status-message');

      function toggleDetails(button) {
        const targetId = button.getAttribute('data-target');
        const detailsRow = document.getElementById(targetId);

        if (!detailsRow) return;
        const opened = !detailsRow.classList.contains('hidden');

        document.querySelectorAll('.details-row').forEach(row => row.classList.add('hidden'));
        document.querySelectorAll('.ticker-button').forEach(btn => btn.setAttribute('aria-expanded', 'false'));

        if (!opened) {
          detailsRow.classList.remove('hidden');
          button.setAttribute('aria-expanded', 'true');
        }
      }

      function handleGrowthTabClick(button) {
        const report = button.dataset.report;
        if (!report) return;

        const group = button.closest('.growth-tabs');
        const section = group?.parentElement;
        if (!section) return;

        section.querySelectorAll('.growth-tab:not(.graph-toggle-btn)').forEach(tab => tab.classList.toggle('active', tab === button));
        section.querySelectorAll('.growth-table').forEach(table => {
          table.classList.toggle('hidden', table.dataset.report !== report);
        });
      }

      function handleGraphToggle(button) {
        const metric = button.dataset.metric;
        if (!metric) return;

        const group = button.closest('.graph-toggle');
        const section = group?.parentElement;
        if (!section) return;

        section.querySelectorAll('.graph-toggle-btn').forEach(tab => tab.classList.toggle('active', tab === button));
        section.querySelectorAll('.chart-card').forEach(card => {
          card.classList.toggle('hidden', card.dataset.metric !== metric);
        });
      }

      document.addEventListener('click', event => {
        const graphButton = event.target.closest('.graph-toggle-btn');
        if (graphButton) {
          handleGraphToggle(graphButton);
          return;
        }

        const growthButton = event.target.closest('.growth-tab:not(.graph-toggle-btn)');
        if (growthButton) {
          handleGrowthTabClick(growthButton);
        }
      });

      function updateNewsPopupTime(wrapper) {
        const datetimeCell = wrapper.querySelector('.news-datetime');
        if (datetimeCell && !datetimeCell.textContent.trim()) {
          const now = new Date();
          datetimeCell.textContent = `${now.toLocaleDateString()} ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        }
      }

      document.addEventListener('mouseover', event => {
        const wrapper = event.target.closest('.news-hover');
        if (wrapper) {
          updateNewsPopupTime(wrapper);
        }
      });

      async function removeStockRow(deleteButton) {
        const row = deleteButton.closest('tr');
        if (!row) return;
        const tickerButton = row.querySelector('.ticker-button');
        const ticker = tickerButton?.textContent?.trim();

        if (ticker) {
          const response = await fetch(`/api/stocks/${encodeURIComponent(ticker)}`, {
            method: 'DELETE'
          });

          if (!response.ok) {
            statusMessage.textContent = `Failed to delete ${ticker}.`;
            return;
          }
        }

        if (tickerButton) {
          const detailsRow = document.getElementById(tickerButton.getAttribute('data-target'));
          if (detailsRow) detailsRow.remove();
        }
        row.remove();
        statusMessage.textContent = `${ticker} deleted from database.`;
      }


';]/'
      function parseNumericValue(raw) {
        if (raw == null) return null;
        const cleaned = String(raw).trim().replace(/[^0-9eE+\-\.]/g, '');
        if (!cleaned || cleaned === '.' || cleaned === '-' || cleaned === '+') return null;
        const value = Number(cleaned);
        return Number.isFinite(value) ? value : null;
      }

      function getSeries(rows, reportType) {
        const values = [];
        const labels = [];

        rows.filter(r => r.report_type === reportType).forEach(row => {
          const numeric = parseNumericValue(row.reported);
          if (numeric != null) {
            labels.push(row.period_label);
            values.push(numeric);
          }
        });

        return { labels, values };
      }
      
    function formatMarketCap(num) {
    if (isNaN(num) || num === null) return 'N/A';
    
    const absNum = Math.abs(num);
    let suffix = '';
    let formattedNum = absNum;

    if (formattedNum >= 1e12) {
        formattedNum /= 1e12;
        suffix = 'T';
    } else if (formattedNum >= 1e9) {
        formattedNum /= 1e9;
        suffix = 'B';
    } else if (formattedNum >= 1e6) {
        formattedNum /= 1e6;
        suffix = 'M';
    } else if (formattedNum >= 1e3) {
        formattedNum /= 1e3;
        suffix = 'K';
    }

    // Use toFixed(2) for precision, unless it's an integer that should look cleaner
    return (formattedNum.toFixed(2).replace(/\.?0+$/, "")) + suffix;
}


      function buildChartSvg(series, options = {}) {
        const width = options.width || 320;
        const height = options.height || 180;
        const padding = 32;
        const chartWidth = width - padding * 2;
        const chartHeight = height - padding * 2;
        const useLog = options.useLog || false;
        const strokeColor = options.strokeColor || '#2563eb';

        if (!series.values.length) {
          return '<p style="margin: 0; color: #475569;">No chart data available.</p>';
        }

        const yValues = series.values.map(value => {
          const positive = Math.max(value, 0.01);
          return useLog ? Math.log10(positive) : value;
        });
        const minY = Math.min(...yValues);
        const maxY = Math.max(...yValues);
        const rangeY = maxY === minY ? 1 : maxY - minY;

        const points = series.values.map((value, index) => {
          const x = padding + (chartWidth * index) / Math.max(series.values.length - 1, 1);
          const rawValue = Math.max(value, 0.01);
          const yValue = useLog ? Math.log10(rawValue) : value;
          const normalized = maxY === minY ? 0.5 : (yValue - minY) / rangeY;
          const y = height - padding - normalized * chartHeight;
          return `${x},${y}`;
        }).join(' ');

        const xLabels = series.labels.map((label, index) => {
          const x = padding + (chartWidth * index) / Math.max(series.labels.length - 1, 1);
          return `<text x="${x}" y="${height - 10}" text-anchor="middle" font-size="10" fill="#475569">${label}</text>`;
        }).join('');

        const yLines = [0, 0.25, 0.5, 0.75, 1].map(fraction => {
          const y = height - padding - fraction * chartHeight;
          const realValue = useLog ? Math.pow(10, minY + (1 - fraction) * rangeY) : minY + (1 - fraction) * rangeY;
          const label = useLog ? realValue.toFixed(1) : realValue.toFixed(1);
          return `
            <text x="8" y="${y + 4}" font-size="10" fill="#475569">${label}</text>
            <line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#e5e7eb" stroke-width="1" />
          `;
        }).join('');

        return `
          <svg class="chart-svg" viewBox="0 0 ${width} ${height}" aria-hidden="true">
            <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="#cbd5e1" stroke-width="1" />
            <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#cbd5e1" stroke-width="1" />
            ${yLines}
            ${xLabels}
            <polyline fill="none" stroke="${strokeColor}" stroke-width="4" points="${points}" />
          </svg>
        `;
      }

      function buildChartPopup(series, metric, reportType, useLog) {
        const metricLabel = metric === 'eps' ? 'EPS' : 'Revenue';
        const reportLabel = reportType === 'quarterly' ? 'Quarters' : 'Years';
        return `
          <div class="chart-popup" role="dialog" aria-label="${metricLabel} ${reportLabel} historical chart">
            <h3 class="chart-title">Full historical ${metricLabel} chart</h3>
            <p class="chart-axis">X-axis: ${reportLabel} • Y-axis: ${metricLabel}</p>
            ${buildChartSvg(series, {useLog, strokeColor: metric === 'revenue' ? '#16a34a' : '#2563eb', width: 520, height: 260})}
          </div>
        `;
      }
     



      function buildChartCard(metric, reportType, rows, useLog) {
        const series = getSeries(rows, reportType);
        const metricLabel = metric === 'eps' ? 'EPS' : 'Revenue';
        const reportLabel = reportType === 'quarterly' ? 'Quarters' : 'Years';
        const chartTypeLabel = useLog ? 'Logarithmic' : 'Linear';
        const strokeColor = metric === 'revenue' ? '#16a34a' : '#2563eb';

        return `
          <div class="chart-card${metric === 'revenue' ? ' hidden' : ''}" data-metric="${metric}" title="Hover for a larger history chart">
            <p class="chart-label">${metricLabel} ${reportType === 'quarterly' ? 'Quarter-to-Quarter' : 'Year-to-Year'} Growth (${chartTypeLabel})</p>
            <p class="chart-axis">X-axis: ${reportLabel} • Y-axis: ${metricLabel}</p>
            ${buildChartSvg(series, {useLog, strokeColor})}
            ${buildChartPopup(series, metric, reportType, useLog)}
          </div>
        `;
      }

      function buildGrowthTable(reportType, rows) {
        const filtered = rows.filter(r => r.report_type === reportType);
        if (!filtered.length) {
          return `<p>No ${reportType} growth data available.</p>`;
        }

        const calculateGrowth = (current, previous) => {
          if (previous === 0 || previous == null || current == null) {
            return null;
          }
          return ((current - previous) / Math.abs(previous)) * 100;
        };

        const buildRow = field => {
          const cells = filtered.map((row, index, allRows) => {
            if (field !== 'growth_rate') {
              return `<td>${row[field] || ''}</td>`;
            }

            const currentValue = parseNumericValue(row.reported);
            const previousValue = index > 0 ? parseNumericValue(allRows[index - 1].reported) : null;
            const growthValue = calculateGrowth(currentValue, previousValue);

            if (growthValue == null) {
              return `<td>${row.reported || ''}</td>`;
            }

            const formatted = `${growthValue >= 0 ? '+' : ''}${growthValue.toFixed(1)}%`;
            return `<td>${formatted}</td>`;
          }).join('');

          return `
            <tr>
              <td>${field === 'growth_rate' ? 'Growth Rate' : field}</td>
              ${cells}
            </tr>
          `;
        };

        const headers = filtered.map(row => `<th>${row.period_label}</th>`).join('');
        const hiddenClass = reportType === 'quarterly' ? ' hidden' : '';
        return `
          <div class="growth-table ${reportType}${hiddenClass}" data-report="${reportType}">
            <table class="details-table">
              <thead>
                <tr><th>Metrics</th>${headers}</tr>
              </thead>
              <tbody>
                ${buildRow('reported')}
                ${buildRow('estimate')}
                ${buildRow('surprise')}
                ${buildRow('growth_rate')}
              </tbody>
            </table>
          </div>
        `;
      }

      function buildGrowthSection(title, rows) {
        return `
          <div>
            <div class="growth-tabs">
              <button class="growth-tab active" type="button" data-report="annual">Annual</button>
              <button class="growth-tab" type="button" data-report="quarterly">Quarterly</button>
            </div>
            <h2 class="section-heading">${title}</h2>
            ${buildGrowthTable('annual', rows)}
            ${buildGrowthTable('quarterly', rows)}
          </div>
        `;
      }

      function buildQuarterlySummaryTable(rows) {
        if (!rows.length) {
          return '<p>No quarterly summary available.</p>';
        }

        const headers = rows.map(row => `<th>${row.quarter}</th>`).join('');
        const transcriptCells = rows.map(row => `<td>${row.transcript || 'No transcript'}</td>`).join('');
        const summaryCells = rows.map(row => `<td>${row.summary || 'No summary'}</td>`).join('');

        return `
          <div>
            <h2 class="section-heading">Quarterly Summary</h2>
            <table class="details-table">
              <thead>
                <tr><th>Metrics</th>${headers}</tr>
              </thead>
              <tbody>
                <tr><td>Transcript</td>${transcriptCells}</tr>
                <tr><td>Summary</td>${summaryCells}</tr>
              </tbody>
            </table>
          </div>
        `;
      }

      function createDetailsRow(detailsId, ticker, info) {
        const detailsRow = document.createElement('tr');
        detailsRow.id = detailsId;
        detailsRow.className = 'details-row hidden';

        const newsItems = info.news || [];
        const newsList = newsItems.length
          ? `
            <table class="news-table">
              <thead>
                <tr><th>Datetime</th><th>Headline</th></tr>
              </thead>
              <tbody>
                ${newsItems.map(item => `<tr><td>${item.datetime || 'Unknown'}</td><td>${item.headline}</td></tr>`).join('')}
              </tbody>
            </table>
          `
          : '<p>No latest news available.</p>';

        detailsRow.innerHTML = `
          <td colspan="7">
            <div class="details-content">
              <div class="details-tables">
                ${buildGrowthSection('EPS Growth', info.earnings_growth || [])}
                ${buildGrowthSection('Revenue Growth', info.revenue_growth || [])}
              </div>
              <div class="growth-tabs graph-toggle">
                <button class="growth-tab active graph-toggle-btn" type="button" data-metric="eps">EPS</button>
                <button class="growth-tab graph-toggle-btn" type="button" data-metric="revenue">Revenue</button>
              </div>
              <div class="chart-row">
                ${buildChartCard('eps', 'quarterly', info.earnings_growth || [], false)}
                ${buildChartCard('eps', 'annual', info.earnings_growth || [], true)}
                ${buildChartCard('revenue', 'quarterly', info.revenue_growth || [], false)}
                ${buildChartCard('revenue', 'annual', info.revenue_growth || [], true)}
              </div>
              ${buildQuarterlySummaryTable(info.quarterly_summary || [])}
              <div class="news-list">
                <h2 class="section-heading">Latest News</h2>
                ${newsList}
              </div>
            </div>
          </td>
        `;
        return detailsRow;
      }

      function attachRowEvents(row) {
        const tickerButton = row.querySelector('.ticker-button');
        const deleteButton = row.querySelector('.delete-button');

        if (tickerButton) {
          tickerButton.addEventListener('click', () => {
            toggleDetails(tickerButton);
          });
        }

        if (deleteButton) {
          deleteButton.addEventListener('click', async () => {
            await removeStockRow(deleteButton);
          });
        }
      }

      function createStockRow(stock) {
        const normalizedTicker = stock.ticker.trim().toUpperCase();
        const detailsId = `details-${normalizedTicker}-${Date.now()}`;

        const latestNews = stock.news?.length ? stock.news[0] : null;
        const headline = latestNews?.headline || stock.latest_news || 'No news headline';
        const newsDatetime = latestNews?.datetime || stock.latest_news_datetime || '';

        const row = document.createElement('tr');
        row.innerHTML = `
          <td><button class="ticker-button" data-target="${detailsId}" aria-expanded="false">${normalizedTicker}</button></td>
          <td>${stock.company_name || 'N/A'}</td>
          <td>${formatMarketCap(stock.market_cap) || 'N/A'}</td>
          <td>${stock.description || 'N/A'}</td>
          <td>${stock.fifty_two_week_high || 'N/A'}</td>
          <td>
            <div class="news-hover">
              <a class="news-link" href="#">${headline}</a>
              <div class="news-popup">
                <table class="news-table">
                  <thead>
                    <tr><th>Datetime</th><th>Headline</th></tr>
                  </thead>
                  <tbody>
                    <tr><td class="news-datetime">${newsDatetime}</td><td>${headline}</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </td>
           <td>${stock.beta || 'N/A'}</td>
          <td><button class="secondary-button delete-button" type="button">Delete</button></td>
        `;

        const detailsRow = createDetailsRow(detailsId, normalizedTicker, stock);
        return { row, detailsRow };
      }

      function attachAllTickerRows() {
        document.querySelectorAll('#stock-table-body tr:not(.details-row)').forEach(row => attachRowEvents(row));
      }

      async function loadStocksFromDatabase() {
        tableBody.innerHTML = '';
        statusMessage.textContent = 'Loading data from database...';

        try {
          const response = await fetch('/api/stocks');
          if (!response.ok) {
            throw new Error('API request failed');
          }

          const data = await response.json();
          data.stocks.forEach(stock => {
            const { row, detailsRow } = createStockRow(stock);
            tableBody.appendChild(row);
            tableBody.appendChild(detailsRow);
            attachRowEvents(row);
          });

          statusMessage.textContent = `Loaded ${data.stocks.length} stocks from database.`;
        } catch (error) {
          
          console.error(error);
          statusMessage.textContent = 'Unable to load stocks from database.';
        }
      }

      form.addEventListener('submit', async event => {
        event.preventDefault();

        const ticker = document.getElementById('ticker-input').value.trim();
        if (!ticker) return;

        statusMessage.textContent = `Fetching details for ${ticker.toUpperCase()}...`;

        try {
          const response = await fetch('/api/stocks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker: ticker.toUpperCase() })
          });

          if (!response.ok) {
            throw new Error('Failed to save stock to database');
          }

          const responseData = await response.json();
          const savedStock = responseData.stock || {};
          const { row, detailsRow } = createStockRow(savedStock);
          tableBody.appendChild(row);
          tableBody.appendChild(detailsRow);
          attachRowEvents(row);
          statusMessage.textContent = `Added ${ticker.toUpperCase()} to database.`;
        } catch (error) {
          console.error(error);
          statusMessage.textContent = `Unable to add ${ticker.toUpperCase()} to database.`;
        }

        form.reset();
      });

      loadStocksFromDatabase();
    });


  </script>
  
  
</body>
</html>
